name: session-pilot tests

# NOTE: repointed from the deleted v1 layout `extensions/session-pilot/**` to the
# v2 canonical `tools/session-pilot/**`. The old triggers never fired after the v2
# migration, so this workflow had not run against real code in months
# (see audit-reports/session-pilot-durability-2026-07-02.md). Zellij setup removed
# (dropped in the v0.3 pivot).

on:
  push:
    branches: [main]
    paths:
      - 'tools/session-pilot/**'
      - '.claude-plugin/hooks.json'
      - '.claude/settings.json'
      - '.github/workflows/session-pilot.yml'
  pull_request:
    paths:
      - 'tools/session-pilot/**'
      - '.claude-plugin/hooks.json'
      - '.claude/settings.json'
      - '.github/workflows/session-pilot.yml'

jobs:
  linux:
    name: Linux — backend + delivery-path guards + cold-start
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup venv (hypothesis + mutmut)
        run: |
          set -e
          VENV=$HOME/.cache/session-pilot-venv
          [ -d "$VENV" ] || python3 -m venv "$VENV"
          "$VENV/bin/pip" install --quiet --upgrade pip
          "$VENV/bin/pip" install --quiet hypothesis mutmut

      - name: Configure synthetic worktrees (CI runner has no real repos)
        run: |
          set -e
          mkdir -p ~/repos/synthetic-foo ~/repos/synthetic-bar
          for d in synthetic-foo synthetic-bar; do
            (cd ~/repos/$d && git init -q && git config user.email ci@x && git config user.name ci && git commit -q --allow-empty -m initial)
          done
          echo "REPOS=$HOME/repos/synthetic-foo:$HOME/repos/synthetic-bar:$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Cold-start via the REAL Linux starter (start-server.sh)
        # Per dead-integration-guard: drive the real delivery path, do NOT presume a
        # running server. This proves start-server.sh (the file that used to be
        # MISSING) actually brings the dashboard up on Linux.
        run: |
          set -e
          bash tools/session-pilot/start-server.sh
          up=0
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8083/api/health >/dev/null 2>&1; then up=1; break; fi
            sleep 0.5
          done
          if [ "$up" != "1" ]; then
            echo "server did not come up via start-server.sh"; cat "${XDG_STATE_HOME:-$HOME/.local/state}/session-pilot/"*.log 2>/dev/null || true
            exit 1
          fi
          curl -fsS http://127.0.0.1:8083/api/index | python3 -c "import json,sys; print('rows:', len(json.load(sys.stdin)['rows']))"

      - name: Run backend + delivery-path guard tests
        run: |
          set -e
          VENV=$HOME/.cache/session-pilot-venv
          T=$GITHUB_WORKSPACE/tools/session-pilot/tests
          PASS=0; FAIL=0
          # test_launcher runs the CROSS-PLATFORM delivery-path guards (SP051/052/053)
          # on Linux — the recurrence-stoppers for the durability rot.
          for f in test_encode_path test_e2e test_diagnose_cli test_frontend_smoke \
                   test_encode_path_module test_frontend_e2e test_jsonl_indexer \
                   test_new_endpoints test_terminal_launcher test_launcher \
                   test_indexer_invariants; do
            r=$("$VENV/bin/python" "$T/$f.py" 2>&1) || true
            p=$(echo "$r" | grep -c "^PASS" || true)
            fl=$(echo "$r" | grep -c -E "^(FAIL|ERROR)" || true)
            printf "%-28s pass=%2s fail=%s\n" "$f" "$p" "$fl"
            [ "$fl" != "0" ] && echo "$r"
            PASS=$((PASS+p)); FAIL=$((FAIL+fl))
          done
          echo "TOTAL pass=$PASS fail=$FAIL"
          [ "$FAIL" = "0" ] || exit 1

      - name: Mutation testing (mutmut on encode_path)
        run: |
          set -eo pipefail
          VENV=$HOME/.cache/session-pilot-venv
          MUT=$GITHUB_WORKSPACE/tools/session-pilot/tests/mutation_target
          cp "$GITHUB_WORKSPACE/tools/session-pilot/tests/encode_path_module.py" "$MUT/encode_path_module.py"
          cp "$GITHUB_WORKSPACE/tools/session-pilot/tests/test_encode_path_module.py" "$MUT/test_encode_path_module.py"
          cd "$MUT"; rm -rf mutants
          PATH="$VENV/bin:$PATH" timeout 300 mutmut run 2>&1 | tail -10 || true
          PATH="$VENV/bin:$PATH" python3 - <<'PY'
          import json, sys, pathlib
          meta = pathlib.Path("mutants/encode_path_module.py.meta")
          if not meta.exists():
              print("ERROR: mutmut meta missing"); sys.exit(1)
          codes = json.loads(meta.read_text()).get("exit_code_by_key", {})
          total = len(codes); killed = sum(1 for v in codes.values() if v == 1)
          rate = 100 * killed / total if total else 0
          print(f"Total: {total} | Killed: {killed} | Rate: {rate:.1f}%")
          sys.exit(0 if rate >= 70.0 else 1)
          PY

  windows:
    name: Windows — real cold-start via the autostart hook (SP054)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Launcher + cold-start tests on the product OS
        shell: pwsh
        run: |
          # SP051/052/053 (delivery-path guards) + SP054 (kill server -> run the real
          # SessionStart hook via bootstrap -> assert /api/health). This is the exact
          # path that was dead on a fresh machine.
          python tools/session-pilot/tests/test_launcher.py
          if ($LASTEXITCODE -ne 0) { exit 1 }
