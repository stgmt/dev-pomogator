services:
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        CACHEBUST: ${CACHEBUST:-1}
    image: dev-pomogator-test:local
    env_file:
      # Machine-local optional config (никогда не коммитился, генератора нет) —
      # required:false чтобы свежая машина не падала на ".env.test not found".
      - path: .env.test
        required: false
    environment:
      - HOME=/home/testuser
      - DEV_POMOGATOR_TEST_IN_DOCKER=1
      - TEST_STATUS_DIR=.dev-pomogator/.docker-status
    volumes:
      # Separate dir for Docker YAML output — tests don't touch this, only wrapper writes here
      - ./.dev-pomogator/.docker-status:/home/testuser/app/.dev-pomogator/.docker-status
      # Persist mutation testing artifacts (reports/mutation/*.html|json) + Stryker sandbox.
      # Empty on regular `npm test`; only Stryker writes here.
      - ./reports:/home/testuser/app/reports
      - ./.stryker-tmp:/home/testuser/app/.stryker-tmp
