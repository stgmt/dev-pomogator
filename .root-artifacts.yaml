# Configuration for forbid-root-artifacts
# See: https://github.com/user/dev-pomogator

mode: extend
allow:
- .env.example
- .env.test
- CHANGELOG.md
- docker-compose.gui.yml
- docker-compose.test.yml
- Dockerfile.gui
- Dockerfile.test
- install
- install.ps1
- install.sh
- uninstall.ps1
- vitest.config.ts
- vitest.unit.config.ts
- .npmignore
